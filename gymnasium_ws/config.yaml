artifacts:
  base:       "/workspaces/gymnasium_ws/artifacts"
  model_dir:  "models"
  curve_dir:  "curves"
  log_file:   "log.csv"
  model_stem: "ant_cmd"

commands:
  dim:     3
  stand:   [0., 0., 0.]
  forward: [1., 0., 0.]
  left:    [0., 1., 0.]
  right:   [0., 0., 1.]

training:
  timesteps:         10000
  n_envs:            10
  seed:              42
  plateau_window:    100
  plateau_threshold: 0.5
  log_every:         20

algorithms:
  sac:
    device:         "auto"
    learning_rate:  0.0003
    buffer_size:    1000000
    batch_size:     256
    gamma:          0.99
    tau:            0.005
    train_freq:     1
    gradient_steps: 1
    ent_coef:       "auto"
  ppo:
    device:        "cpu"
    learning_rate: 0.0003
    n_steps:       2048
    batch_size:    64
    n_epochs:      10
    gamma:         0.99
    gae_lambda:    0.95
    clip_range:    0.2
    ent_coef:      0.0

curriculum:
  min_samples: 5    # min steps to hold a command before sampling a new one
  max_samples: 20   # max steps to hold a command before sampling a new one
  stages:
    - name: "stand"
      commands:
        stand: 1.0
    - name: "forward"
      commands:
        stand:   0.2
        forward: 0.8