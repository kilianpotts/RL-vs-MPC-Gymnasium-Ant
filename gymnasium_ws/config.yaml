artifacts:
  base:       "/workspaces/gymnasium_ws/artifacts"
  model_dir:  "models"
  curve_dir:  "curves"
  training_csv_dir: "training"
  log_file:   "log.csv"
  model_stem: "ant_cmd"

commands:
  dim:     3
  stand:   [0., 0., 0.]
  forward: [1., 0., 0.]
  left:    [0., 1., 0.]
  right:   [0., 0., 1.]

training:
  timesteps:                  15000000
  n_envs:                     10
  seed:                       42
  plateau_window:             10000
  plateau_threshold:          50
  log_every:                  20
  min_timesteps_before_stop:  15000000

algorithms:
  sac:
    device:         "auto"
    learning_rate:  0.0001
    buffer_size:    500000
    batch_size:     256
    gamma:          0.99
    tau:            0.005
    train_freq:     1
    gradient_steps: 1
    ent_coef:       "auto"
  ppo:
    device:        "auto"
    learning_rate: 0.0001
    n_steps:       2048
    batch_size:    64
    n_epochs:      10
    gamma:         0.99
    gae_lambda:    0.95
    clip_range:    0.2
    ent_coef:      0.0

curriculum:
  min_samples: 80    # min steps to hold a command before sampling a new one
  max_samples: 200   # max steps to hold a command before sampling a new one
  stages:
    - name: cur_stand
      commands:
        stand: 1.0
      previous: null

    - name: cur_forward
      commands:
        stand: 0.3
        forward: 0.7
      previous: cur_stand

    - name: cur_turns
      commands:
        stand: 0.15
        forward: 0.15
        left: 0.35
        right: 0.35
      previous: cur_forward


    - name: cur_all
      commands:
        stand: 0.25
        forward: 0.25
        left: 0.25
        right: 0.25
      previous: cur_turns


terrain:
  default_roughness: 1.0